<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deseret Book Art</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="content-panel">

    <div class="title-wrapper">
      <h1 class="header-title">Deseret Book Art</h1>
    </div>

    <div class="top-section">

      <div class="hero-image">
        <img src="images/Lamb_of_God.jpeg" alt="Lamb of God">
      </div>

      <nav class="nav-list">
        <ol>
          <li>Deseret Book</li>
          <li>Framed Art</li>
          <li>Matted/Prints</li>
          <li>Statues</li>
          <li>Willow Tree</li>
          <li>Contact</li>
        </ol>
      </nav>

    </div>

    <section class="text-block">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed vitae tincidunt lorem.
        Integer non libero nec justo gravida aliquet.
      </p>
    </section>

    <section class="image-row-wrapper">
      <section class="image-row">
        <div class="img-box">
          <img src="images/Take_My_Hand.png" alt="Take My Hand">
        </div>
        <div class="img-box">
          <img src="images/Christus.png" alt="Christus">
        </div>
        <div class="img-box">
          <img src="images/Willow_Tree.png" alt="Willow Tree">
        </div>
      </section>
    </section>

    <footer class="footer">
      <img src="images/db_logo.webp" alt="Deseret Book Logo" class="db-logo">
    </footer>

  </div>

</body>
</html>
