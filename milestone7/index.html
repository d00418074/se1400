<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deseret Book Art</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="content">
    <div class="title_box">
      <h1 class="title">Deseret Book Art</h1>
    </div>
    <div class="top_section">
      <div class="main_image">
        <picture>
          <source media="(min-width: 992px)" srcset="images/Lamb_of_God_Large.jpg">
          <source media="(min-width: 768px)" srcset="images/Lamb_of_God_Medium.jpg">
          <img src="images/Lamb_of_God_Small.jpg" alt="Lamb of God">
        </picture>
      </div>
      <nav class="nav_list">
        <ul>
          <li><a href="https://www.deseretbook.com/category/home/home_fine-art/" target ="_blank">Deseret Book</a></li>
          <li><a href="framed_art.html" target="_blank">Framed Art</a></li>
          <li><a href="matted_prints.html" target="_blank">Matted/Prints</a></li>
          <li><a href="statues.html" target="_blank">Statues</a></li>
          <li><a href="willow_tree.html" target="_blank">willow Tree</a></li>
          <li><a href="contact_info.html" target="_blank">Contact Info</a></li>
        </ul>
      </nav>
    </div>

    <section class="text_block">
      <p>
        "We cultivate stories worth telling, questions worth exploring, and beauty worth sharing 
        to improve the lives of ALL Latter-Day Saints at every step of their journey."
      </p>
    </section>

    <section class="image_box">
      <section class="images">
        <div>
          <img src="images/Take_My_Hand.png" alt="Take My Hand">
        </div>
        <div>
          <img src="images/Christus.png" alt="Christus">
        </div>
        <div>
          <img src="images/Willow_Tree.png" alt="Willow Tree">
        </div>
      </section>
    </section>

    <footer class="footer">
      <img src="images/db_logo.webp" alt="Deseret Book Logo" class="db_logo">
    </footer>
  </div>
</body>
</html>
